<!doctype html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Academic Details</title>


    <meta name="description" content="View detailed student performance including test scores, exam results, notes, total score, average, and grade for the term or semester.">
    <meta name="author" content="Elemide Joshua Damilare">

    <!-- Open Graph -->
    <meta property="og:title" content="Student Academic Details">
    <meta property="og:description" content="Check student results including test, exam, and note scores with overall performance and grading.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://joshuadevhub.github.io/mini-student-management/students-detail-page.html">
    <meta property="og:image" content="https://joshuadevhub.github.io/mini-student-management/images/og-image.png">

    <!-- Favicons -->
    <!-- Standard favicon -->
    <link rel="icon" href="favicon/favicon.ico" type="image/x-icon">
    <!-- PNG formats -->
    <link rel="icon" type="image/png" sizes="32x32" href="favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon/favicon-16x16.png">
    <!-- Apple iOS -->
    <link rel="apple-touch-icon" sizes="180x180" href="favicon/apple-touch-icon.png">
    <!-- Android Chrome -->
    <link rel="icon" type="image/png" sizes="192x192" href="favicon/android-chrome-192x192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="favicon/android-chrome-512x512.png">

    <!-- Links and Scripts -->
    <link rel="stylesheet" href="styles/student-detail-page.css">
    <script src="scripts/firebase.js" type="module"></script>
    <script src="scripts/student-detail-page.js" type="module"></script>

  </head>

  <body>
    <div class="wrapper">
      <!-- Header -->
      <header class="header">
        <img id="student-avatar">
        <div class="header-meta">
          <h1 id="student-name"></h1>
          <p id="student-department"></p>
        </div>
      </header>

      <!-- Stats Overview -->
      <div class="stats-grid">
        <div class="stat-card">
          <span class="stat-label">Total Score</span>
          <span class="stat-value" id="overall-total">--</span>
        </div>
        <div class="stat-card">
          <span class="stat-label">Average</span>
          <span class="stat-value" id="overall-avg">--</span>
        </div>
        <div class="stat-card">
          <span class="stat-label">Grade</span>
          <span class="stat-value" id="overall-grade">--</span>
        </div>
        <div class="stat-card">
          <span class="stat-label">Status</span>
          <span class="stat-value" id="overall-status">--</span>
        </div>
      </div>

      <h2 class="section-title">Enrolled Subjects</h2>

      <!-- Subjects Container -->
      <div id="subjects-container">
        <!-- JavaScript Dynamic Implementation here -->
      </div>
    </div>

    <!-- Fixed Footer -->
    <div class="footer-actions">
      <button id="finalize-scores-btn" style="display: none;">Finalize all Scores</button>
      <button id="save-scores-btn">Save / Update Scores</button>
      <button id="view-report-cards">View Report Card</button>
    </div>

    <div class="toast" id="toast"></div>

    <!-- Spinner -->
    <div id="report-loader" class="report-loader hidden">
      <div class="loader-card">
        <div class="spinner-ring"></div>
        <h3>Generating Report Card</h3>
        <p>Please wait while we prepare your academic result...</p>
      </div>
    </div>
  </body>
</html>
