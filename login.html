<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Portal | Login</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="styles/admin-login.css">

    <script src="scripts/firebase.js" type="module"></script>
    <script src="scripts/admin-login.js" type="module"></script>
    <!-- Lucide Icons for the eye and lock -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

    <!-- Background Decorative Elements -->
    <div class="bg-glow-1"></div>
    <div class="bg-glow-2"></div>

    <div class="login-container">
        <main class="login-card">
            <!-- Logo/Icon -->
            <div class="logo-section">
                <div class="logo-wrapper">
                    <i data-lucide="shield-check" class="logo-icon"></i>
                </div>
                <h1>Welcome Back</h1>
                <p class="subtitle">Enter your credentials to access the dashboard</p>
            </div>

            <!-- Login Form -->
            <form class="login-form" id="login-form">
                <div class="input-group">
                    <label for="email">Email Address</label>
                    <div class="input-wrapper">
                        <i data-lucide="mail" class="field-icon"></i>
                        <input type="email" id="email" placeholder="admin@someone.com" required>
                    </div>
                </div>

                <div class="input-group">
                    <div class="label-row">
                        <label for="password">Password</label>
                        <a href="#" class="forgot-link">Forgot Password?</a>
                    </div>
                    <div class="input-wrapper">
                        <i data-lucide="lock" class="field-icon"></i>
                        <input type="password" id="password" placeholder="••••••••" required>
                        <button type="button" class="toggle-password" id="togglePassword">
                            <i data-lucide="eye" class="eye-icon"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" class="login-btn">
                    <span>Sign In</span>
                    <i data-lucide="arrow-right" class="btn-icon"></i>
                </button>
            </form>

            <p id="login-error" style="color:red; margin-top:1rem;"></p>

            <footer class="login-footer">
                <p>&copy; 2025 joshuadevhub Admin Panel. All rights reserved.</p>
            </footer>
        </main>
    </div>

    <script>
        // Initialize Icons
        lucide.createIcons();

        // Password Toggle Logic
        const toggleBtn = document.querySelector('#togglePassword');
        const passwordInput = document.querySelector('#password');
        
        toggleBtn.addEventListener('click', () => {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            // Refresh icon
            const icon = toggleBtn.querySelector('i');
            icon.setAttribute('data-lucide', type === 'password' ? 'eye' : 'eye-off');
            lucide.createIcons();
        });
    </script>
</body>
</html>
