<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Student Management System</title>


    <meta name="description" content="Secure admin login portal to manage student records, update scores, and control academic data within the system.">
    <meta name="author" content="Elemide Joshua Damilare">

    <!-- Open Graph -->
    <meta property="og:title" content="Admin Login - Student Management System">
    <meta property="og:description" content="Authorized admin access to manage student data, update results, and maintain academic records securely.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://joshuadevhub.github.io/mini-student-management/login.html">
    <meta property="og:image" content="https://joshuadevhub.github.io/images/og-image.png">

    <!-- Favicons -->
    <!-- Standard favicon -->
    <link rel="icon" href="favicon/favicon.ico" type="image/x-icon">
    <!-- PNG formats -->
    <link rel="icon" type="image/png" sizes="32x32" href="favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon/favicon-16x16.png">
    <!-- Apple iOS -->
    <link rel="apple-touch-icon" sizes="180x180" href="favicon/apple-touch-icon.png">
    <!-- Android Chrome -->
    <link rel="icon" type="image/png" sizes="192x192" href="favicon/android-chrome-192x192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="favicon/android-chrome-512x512.png">


    <!-- Links and Scripts -->
    <link rel="stylesheet" href="styles/admin-login.css">
    <script src="scripts/firebase.js" type="module"></script>
    <script src="scripts/admin-login.js" type="module"></script>
    <!-- Lucide Icons for the eye and lock -->
    <script src="https://unpkg.com/lucide@latest"></script>

</head>
<body>

    <!-- Background Decorative Elements -->
    <div class="bg-glow-1"></div>
    <div class="bg-glow-2"></div>

    <div class="login-container">
        <main class="login-card">
            <!-- Logo/Icon -->
            <div class="logo-section">
                <div class="logo-wrapper">
                    <i data-lucide="shield-check" class="logo-icon"></i>
                </div>
                <h1>Welcome Back</h1>
                <p class="subtitle">Enter your credentials to access the dashboard</p>
            </div>

            <!-- Login Form -->
            <form class="login-form" id="login-form">
                <div class="input-group">
                    <label for="email">Email Address</label>
                    <div class="input-wrapper">
                        <i data-lucide="mail" class="field-icon"></i>
                        <input type="email" id="email" placeholder="admin@someone.com" required>
                    </div>
                </div>

                <div class="input-group">
                    <div class="label-row">
                        <label for="password">Password</label>
                        <a href="#" class="forgot-link">Forgot Password?</a>
                    </div>
                    <div class="input-wrapper">
                        <i data-lucide="lock" class="field-icon"></i>
                        <input type="password" id="password" placeholder="••••••••" required>
                        <button type="button" class="toggle-password" id="togglePassword">
                            <i data-lucide="eye" class="eye-icon"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" class="login-btn">
                    <span>Sign In</span>
                    <i data-lucide="arrow-right" class="btn-icon"></i>
                </button>
            </form>

            <p id="login-error" style="color:red; margin-top:1rem;"></p>

            <footer class="login-footer">
                <p>&copy; 2025 joshuadevhub Admin Panel. All rights reserved.</p>
            </footer>
        </main>
    </div>

    <script>
        // Initialize Icons
        lucide.createIcons();

        // Password Toggle Logic
        const toggleBtn = document.querySelector('#togglePassword');
        const passwordInput = document.querySelector('#password');
        
        toggleBtn.addEventListener('click', () => {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            // Refresh icon
            const icon = toggleBtn.querySelector('i');
            icon.setAttribute('data-lucide', type === 'password' ? 'eye' : 'eye-off');
            lucide.createIcons();
        });
    </script>
</body>
</html>
