<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta property="og:image" content="https://joshuadevhub.github.io/mini-student-management/images/og-image.png">
    <meta property="og:site_name" content="mini-student-management">

    <!-- Standard favicon -->
    <link rel="icon" href="../favicon/favicon.ico" type="image/x-icon">
    <!-- PNG formats -->
    <link rel="icon" type="image/png" sizes="32x32" href="../favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon/favicon-16x16.png">
    <!-- Apple iOS -->
    <link rel="apple-touch-icon" sizes="180x180" href="favicon/apple-touch-icon.png">
    <!-- Android Chrome -->
    <link rel="icon" type="image/png" sizes="192x192" href="favicon/android-chrome-192x192.png">

    <!-- Scripts and Links -->
    <script src="scripts/firebase.js" type="module"></script>
    <script src="scripts/sign-up.js" type="module"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <link rel="stylesheet" href="styles/sign-up.css">
</head>

<body>

    <div class="container">
        <main class="signup-card">
            <header class="card-header">
                <h1>Student Sign-Up</h1>
                <p>Create your account to access your profile.</p>
            </header>

            <form id="signup-form">

                <div class="input-group">
                    <label for="email">Email Address</label>
                    <div class="input-wrapper">
                        <i data-lucide="mail" class="input-icon"></i>
                        <input type="email" id="email" placeholder="email@university.edu">
                    </div>
                </div>

                <div class="input-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <i data-lucide="lock" class="input-icon"></i>
                        <input type="password" id="password" placeholder="••••••••">
                    </div>
                </div>

                <button type="submit" id="submitBtn" class="submit-btn">
                    Create Account
                </button>
            </form>

            <span class="error-msg" id="error-msg"></span>

            <footer class="card-footer">
                <p>Already have an account? <a href="login.html">Login</a></p>
            </footer>
        </main>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast hidden">
        <span id="toast-message">Account created successfully!</span>
    </div>

    <script>
        // Initialize Lucide Icons
        lucide.createIcons();

</body>
</html>
