<!DOCTYPE html>

<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Register Form</title>

  <link rel="stylesheet" href="styles/main.css">
  <link rel="stylesheet" href="styles/index.css">

  <script src="scripts/form.js" defer></script>
</head>

<body>
  
  <header></header>

  <main>
    <div>
      <div class="container">
        <h2>Registration Form</h2>
  
        <form action="#" method="get" id="student-form">
          <div class="form-group">
            <label for="first-name">First Name *</label>
            <input type="text" placeholder="John" id="first-name" autocomplete="cc-given-name" name="first_name">
            <p class="error-message"></p>
          </div>
  
          <div class="form-group">
            <label for="last-name">Last Name *</label>
            <input type="text" placeholder="Doe" id="last-name" autocomplete="cc-family-name" name="last_name">
            <p class="error-message"></p>
          </div>
  
          <div class="form-group">
            <label for="middle-name">Other Name (Optional)</label>
            <input type="text" id="middle-name" autocomplete="cc-additional-name" name="middle_name">
          </div>
  
          <div class="form-group">
            <label for="departments">Department *</label>
            <select id="departments">
              <option value="" selected disabled>Select Department</option>
              <option value="science">Science</option>
              <option value="art">Art</option>
              <option value="commercial">Commercial</option>
            </select>
            <p class="error-message"></p>
          </div>
  
          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" placeholder="someone@example.com" id="email" autocomplete="email" name="email">
          </div>
  
          <div class="form-group">
            <label for="phone-number">Phone Number *</label>
            <input type="tel" placeholder="" id="phone-number" autocomplete="mobile" name="phone_number">
            <p class="error-message"></p>
          </div>
  
          <div class="form-group" id="subject-container">
            <label for="offered-subject">Subjects *</label>
            <!-- <div class="subject-container" id="subject-container">
            </div> -->
            <!-- <p class="error-message"></p> -->
          </div>
  
          <div class="form-group">
            <label for="address">Address *</label>
            <textarea name="address" id="address" placeholder="Enter Address ..."></textarea>
            <p class="error-message"></p>
          </div>
  
          <button type="submit">Register Student</button>
        </form>
      </div>
    </div>

  </main>

  <footer></footer>
</body>

</html>
