<!DOCTYPE html>

<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Registration Portal</title>

  <meta name="description" content="Register students using our student management system. Fill out the form to create a student profile and manage academic records efficiently.">

  <!-- Open Graph -->
  <meta property="og:title" content="Student Registration Portal">
  <meta property="og:description" content="Register students and create academic profiles with ease using our modern student management system.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://joshuadevhub.github.io/mini-student-management/index.html">

  <!-- Favicons -->
  <!-- Standard favicon -->
  <link rel="icon" href="favicon/favicon.ico" type="image/x-icon">
  <!-- PNG formats -->
  <link rel="icon" type="image/png" sizes="32x32" href="favicon/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon/favicon-16x16.png">
  <!-- Apple iOS -->
  <link rel="apple-touch-icon" sizes="180x180" href="favicon/apple-touch-icon.png">
  <!-- Android Chrome -->
  <link rel="icon" type="image/png" sizes="192x192" href="favicon/android-chrome-192x192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="favicon/android-chrome-512x512.png">


  <!-- Links and Scripts -->
  <link rel="stylesheet" href="styles/demo.css">
  <script src="scripts/firebase.js" type="module"></script>
  <script src="scripts/form.js" type="module"></script>
  <script src="https://unpkg.com/@phosphor-icons/web"></script>

</head>

<body class="dark-mode">
  
  <!-- Header -->
  <header class="app-header">
      <div class="logo">
          <div class="logo-icon"></div>
          <span>Student Manager</span>
      </div>
      <button class="menu-btn" aria-label="Open Menu">
          <i class="ph ph-list"></i>
      </button>
  </header>

  <main class="content">
    <div class="page">
      <div class="container">
        <h2>Registration Form</h2>
  
        <form action="#" method="get" id="student-form">
          <div class="form-group">
            <label for="first-name">First Name *</label>
            <input type="text" placeholder="John" id="first-name" autocomplete="cc-given-name" name="first_name">
            <p class="error-message"></p>
          </div>
  
          <div class="form-group">
            <label for="last-name">Last Name *</label>
            <input type="text" placeholder="Doe" id="last-name" autocomplete="cc-family-name" name="last_name">
            <p class="error-message"></p>
          </div>
  
          <div class="form-group">
            <label for="middle-name">Other Name (Optional)</label>
            <input type="text" id="middle-name" autocomplete="cc-additional-name" name="middle_name">
          </div>
  
          <div class="form-group">
            <label for="departments">Department *</label>
            <select id="departments">
              <option value="" selected disabled>Select Department</option>
              <option value="science">Science</option>
              <option value="art">Art</option>
              <option value="commercial">Commercial</option>
            </select>
            <p class="error-message"></p>
          </div>
  
          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" placeholder="someone@example.com" id="email" autocomplete="email" name="email">
          </div>
  
          <div class="form-group">
            <label for="phone-number">Phone Number *</label>
            <input type="tel" placeholder="" id="phone-number" autocomplete="mobile" name="phone_number">
            <p class="error-message"></p>
          </div>
  
          <div class="form-group" id="subject-container">
            <label for="offered-subject">Subjects *</label>
            <!-- <div class="subject-container" id="subject-container">
            </div> -->
            <!-- <p class="error-message"></p> -->
          </div>
  
          <div class="form-group">
            <label for="address">Address *</label>
            <textarea name="address" id="address" placeholder="Enter Address ..."></textarea>
            <p class="error-message"></p>
          </div>

          <div class="form-group">
            <label for="profile-pic">Upload an Image *</label>
            <input type="file" id="profile-pic" accept="image/*">
            <p class="error-message"></p>
          </div>
  
          <button type="submit">Register Student</button>
        </form>
      </div>
    </div>
  </main>

  <!-- Floating Mobile Footer -->
  <footer class="app-footer">
      <nav class="footer-nav">
          <a href="index.html" class="nav-item active">
              <i class="ph ph-house-simple"></i>
              <span>Home</span>
          </a>
          <a href="students-list.html" class="nav-item">
              <i class="ph ph-users"></i>
              <span>Students</span>
          </a>
          <a href="#" class="nav-item">
              <i class="ph ph-chart-bar"></i>
              <span>Reports</span>
          </a>
          <a href="login.html" class="nav-item">
              <i class="ph ph-shield-check"></i>
              <span>Log In</span>
          </a>
      </nav>
  </footer>

  <div id="toast" class="toast"></div>
</body>

</html>
