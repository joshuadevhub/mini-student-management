<!DOCTYPE html>

<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Register Form</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles/demo.css">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>



  <!-- <link rel="stylesheet" href="styles/main.css">
  <link rel="stylesheet" href="styles/index.css"> -->

  <script src="scripts/form.js" defer></script>
</head>

<body class="dark-mode">
  
  <!-- Header -->
  <header class="app-header">
      <div class="logo">
          <div class="logo-icon"></div>
          <span>Student Manager</span>
      </div>
      <button class="menu-btn" aria-label="Open Menu">
          <i class="ph ph-list"></i>
      </button>
  </header>

  <main class="content">
    <div class="page">
      <div class="container">
        <h2>Registration Form</h2>
  
        <form action="#" method="get" id="student-form">
          <div class="form-group">
            <label for="first-name">First Name *</label>
            <input type="text" placeholder="John" id="first-name" autocomplete="cc-given-name" name="first_name">
            <p class="error-message"></p>
          </div>
  
          <div class="form-group">
            <label for="last-name">Last Name *</label>
            <input type="text" placeholder="Doe" id="last-name" autocomplete="cc-family-name" name="last_name">
            <p class="error-message"></p>
          </div>
  
          <div class="form-group">
            <label for="middle-name">Other Name (Optional)</label>
            <input type="text" id="middle-name" autocomplete="cc-additional-name" name="middle_name">
          </div>
  
          <div class="form-group">
            <label for="departments">Department *</label>
            <select id="departments">
              <option value="" selected disabled>Select Department</option>
              <option value="science">Science</option>
              <option value="art">Art</option>
              <option value="commercial">Commercial</option>
            </select>
            <p class="error-message"></p>
          </div>
  
          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" placeholder="someone@example.com" id="email" autocomplete="email" name="email">
          </div>
  
          <div class="form-group">
            <label for="phone-number">Phone Number *</label>
            <input type="tel" placeholder="" id="phone-number" autocomplete="mobile" name="phone_number">
            <p class="error-message"></p>
          </div>
  
          <div class="form-group" id="subject-container">
            <label for="offered-subject">Subjects *</label>
            <!-- <div class="subject-container" id="subject-container">
            </div> -->
            <!-- <p class="error-message"></p> -->
          </div>
  
          <div class="form-group">
            <label for="address">Address *</label>
            <textarea name="address" id="address" placeholder="Enter Address ..."></textarea>
            <p class="error-message"></p>
          </div>

          <div class="form-group">
            <label for="profile-pic">Upload an Image *</label>
            <input type="file" id="profile-pic" accept="image/*">
            <p class="error-message"></p>
          </div>
  
          <button type="submit">Register Student</button>
        </form>
      </div>
    </div>
  </main>

  <!-- Floating Mobile Footer -->
  <footer class="app-footer">
      <nav class="footer-nav">
          <a href="#" class="nav-item active">
              <i class="ph ph-house-simple"></i>
              <span>Home</span>
          </a>
          <a href="#" class="nav-item">
              <i class="ph ph-users"></i>
              <span>Students</span>
          </a>
          <a href="#" class="nav-item">
              <i class="ph ph-chart-bar"></i>
              <span>Reports</span>
          </a>
          <a href="#" class="nav-item">
              <i class="ph ph-gear-six"></i>
              <span>Settings</span>
          </a>
      </nav>
  </footer>
</body>

</html>
