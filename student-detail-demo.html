<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Student Grading Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f172a;
            --glass-surface: rgba(30, 41, 59, 0.7);
            --accent: #6366f1;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --glass-border: rgba(255, 255, 255, 0.1);
            --success: #10b981;
            --danger: #ef4444;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }

        body {
            background-color: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 15px;
            display: flex;
            justify-content: center;
        }

        .container { width: 100%; max-width: 900px; animation: fadeIn 0.8s ease-out; }

        /* --- Header Section --- */
        .student-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 25px;
            padding: 10px;
        }

        #student-avatar {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: 2px solid var(--accent);
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.3);
        }

        .header-info h1 { font-size: 1.4rem; font-weight: 700; }
        .header-info p { color: var(--text-secondary); font-size: 0.9rem; }

        /* --- Performance Summary Row --- */
        .overall-summary {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }

        .summary-box {
            background: var(--glass-surface);
            border: 1px solid var(--glass-border);
            padding: 15px;
            border-radius: 12px;
            text-align: center;
        }

        .summary-label { font-size: 0.7rem; color: var(--text-secondary); text-transform: uppercase; margin-bottom: 5px; }
        .summary-value { font-size: 1.2rem; font-weight: 700; color: var(--accent); }

        /* --- Subject Cards --- */
        #subjects-container { display: flex; flex-direction: column; gap: 20px; margin-bottom: 40px; }

        .subject-card {
            background: var(--glass-surface);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 24px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
        }

        .subject-card:hover {
            transform: translateY(-5px);
            border-color: rgba(99, 102, 241, 0.3);
        }

        .subject-title-area {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 10px;
        }

        .subject-name { font-size: 1.1rem; font-weight: 600; color: var(--text-primary); }

        /* Input Grid */
        .card-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        .input-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .input-group { display: flex; flex-direction: column; gap: 6px; }
        .input-group label { font-size: 0.75rem; color: var(--text-secondary); font-weight: 500; }

        input[type="number"], textarea {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            padding: 10px;
            color: var(--text-primary);
            font-size: 1rem;
            outline: none;
        }

        input:focus, textarea:focus { border-color: var(--accent); }

        /* Results Area */
        .results-grid {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            padding: 15px;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .res-label { font-size: 0.75rem; color: var(--text-secondary); display: block; }
        .res-value { font-size: 1rem; font-weight: 600; }

        .status-badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 700;
            background: rgba(255,255,255,0.1);
        }

        .comment-area { grid-column: span 1; }
        textarea { width: 100%; height: 60px; resize: none; font-size: 0.85rem; }

        /* --- Footer --- */
        #save-scores-btn {
            background: var(--accent);
            color: white;
            border: none;
            width: 100%;
            padding: 18px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            margin-bottom: 50px;
        }

        #save-scores-btn:hover { opacity: 0.9; transform: scale(1.01); }

        /* --- Desktop Refinement --- */
        @media (min-width: 768px) {
            .card-grid { grid-template-columns: 1fr 1fr; }
            .overall-summary { grid-template-columns: repeat(4, 1fr); }
            .header-info h1 { font-size: 2rem; }
            .comment-area { grid-column: span 2; }
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div class="container">
        <!-- Header -->
        <header class="student-header">
            <img id="student-avatar" src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix" alt="Avatar">
            <div class="header-info">
                <h1 id="student-name">Alex Rivera</h1>
                <p id="student-department">BSc. Computer Science • Year 3</p>
            </div>
        </header>

        <!-- Summary Statistics -->
        <div class="overall-summary">
            <div class="summary-box">
                <div class="summary-label">Average Score</div>
                <div class="summary-value" id="overall-avg">0.0%</div>
            </div>
            <div class="summary-box">
                <div class="summary-label">Credits</div>
                <div class="summary-value" id="total-credits">12</div>
            </div>
            <div class="summary-box">
                <div class="summary-label">GPA</div>
                <div class="summary-value" id="overall-gpa">0.00</div>
            </div>
            <div class="summary-box">
                <div class="summary-label">Rank</div>
                <div class="summary-value" id="student-rank">#--</div>
            </div>
        </div>

        <!-- Subjects List -->
        <section id="subjects-container">
            
            <!-- Subject Card -->
            <div class="subject-card">
                <div class="subject-title-area">
                    <span class="subject-name">Software Architecture</span>
                    <span class="status-badge" id="passfail-software">PENDING</span>
                </div>

                <div class="card-grid">
                    <!-- Inputs -->
                    <div class="input-row">
                        <div class="input-group">
                            <label>Note (/20)</label>
                            <input type="number" class="note-score" placeholder="0">
                        </div>
                        <div class="input-group">
                            <label>Test (/20)</label>
                            <input type="number" class="test-score" placeholder="0">
                        </div>
                        <div class="input-group">
                            <label>Exam (/60)</label>
                            <input type="number" class="exam-score" placeholder="0">
                        </div>
                    </div>

                    <!-- Calculated Results -->
                    <div class="results-grid">
                        <div>
                            <span class="res-label">Final Score</span>
                            <span class="res-value" id="total-software">0/100</span>
                        </div>
                        <div>
                            <span class="res-label">Percentage</span>
                            <span class="res-value" id="percentage-software">0%</span>
                        </div>
                        <div>
                            <span class="res-label">Grade</span>
                            <span class="res-value" id="grade-software" style="color:var(--accent)">-</span>
                        </div>
                        <div>
                            <span class="res-label">Credit Point</span>
                            <span class="res-value">4.0</span>
                        </div>
                    </div>

                    <!-- Comment Field -->
                    <div class="comment-area">
                        <div class="input-group">
                            <label>Instructor Comments</label>
                            <textarea id="comment-software" placeholder="Enter remarks about student performance..."></textarea>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Subject Card 2 -->
            <div class="subject-card">
                <div class="subject-title-area">
                    <span class="subject-name">Database Systems</span>
                    <span class="status-badge" id="passfail-db" style="color: var(--success)">PASSED</span>
                </div>

                <div class="card-grid">
                    <div class="input-row">
                        <div class="input-group">
                            <label>Note</label>
                            <input type="number" class="note-score" value="15">
                        </div>
                        <div class="input-group">
                            <label>Test</label>
                            <input type="number" class="test-score" value="18">
                        </div>
                        <div class="input-group">
                            <label>Exam</label>
                            <input type="number" class="exam-score" value="52">
                        </div>
                    </div>

                    <div class="results-grid">
                        <div>
                            <span class="res-label">Final Score</span>
                            <span class="res-value" id="total-db">85/100</span>
                        </div>
                        <div>
                            <span class="res-label">Percentage</span>
                            <span class="res-value" id="percentage-db">85%</span>
                        </div>
                        <div>
                            <span class="res-label">Grade</span>
                            <span class="res-value" id="grade-db" style="color:var(--success)">A</span>
                        </div>
                        <div>
                            <span class="res-label">Credit Point</span>
                            <span class="res-value">3.0</span>
                        </div>
                    </div>

                    <div class="comment-area">
                        <div class="input-group">
                            <label>Instructor Comments</label>
                            <textarea id="comment-db">Excellent understanding of SQL optimization.</textarea>
                        </div>
                    </div>
                </div>
            </div>

        </section>

        <!-- Footer -->
        <footer class="footer">
            <button id="save-scores-btn">Save / Update Scores</button>
        </footer>
    </div>

</body>
</html>
